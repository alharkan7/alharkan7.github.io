<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Video Galaxy</title>
  <meta name="description" content="An interactive 3D galaxy exploring semantic clusters of YouTube history." />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/logo.png" />
  <link rel="canonical" href="https://raihankalla.id/youtube-galaxy" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Semantic Video Galaxy" />
  <meta property="og:description" content="An interactive 3D galaxy exploring semantic clusters of YouTube history." />
  <meta property="og:site_name" content="al Harkan's Blog" />
  <meta property="og:url" content="https://raihankalla.id/youtube-galaxy" />
  <meta property="og:locale" content="id_ID" />
  <meta property="og:logo" content="https://www.raihankalla.id/assets/logo.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://raihankalla.id/youtube-galaxy" />
  <meta name="twitter:title" content="Semantic Video Galaxy" />
  <meta name="twitter:description" content="An interactive 3D galaxy exploring semantic clusters of YouTube history." />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 3D Force Graph Library -->
  <script src="https://unpkg.com/3d-force-graph"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #020617; /* slate-950 */
    }
    .tooltip {
      position: absolute;
      pointer-events: none;
      z-index: 50;
      background-color: #0f172a; /* slate-900 */
      border: 1px solid #334155; /* slate-700 */
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
      border-radius: 0.5rem;
      padding: 0.75rem;
      max-width: 20rem;
      opacity: 0;
      transition: opacity 100ms ease-in-out;
      transform: translate(15px, 15px);
    }
    .tooltip.visible {
      opacity: 1;
    }
    /* Custom scrollbar for sidebar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
  </style>
</head>
<body class="flex flex-col md:flex-row w-screen h-screen">

  <!-- 3D Explorer Area -->
  <div id="explorer-container" class="relative flex-1 h-full min-h-[500px]">
    
    <!-- Loading Overlay -->
    <div id="loading" class="absolute inset-0 flex items-center justify-center bg-slate-950/80 z-20 text-slate-300">
      <div class="flex flex-col items-center gap-4">
        <div class="w-8 h-8 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
        <p class="animate-pulse">Loading 3D semantic layout...</p>
      </div>
    </div>

    <!-- WebGL Container -->
    <div id="3d-graph" class="absolute inset-0 w-full h-full cursor-grab"></div>

    <!-- HUD Overlay -->
    <div class="absolute bottom-4 left-4 bg-slate-900/80 backdrop-blur-sm border border-slate-700 p-3 rounded-lg pointer-events-none shadow-lg z-10">
      <h2 class="text-white font-bold text-sm m-0">3D Semantic Video Explorer</h2>
      <p class="text-slate-400 text-xs mt-1">Left-click to rotate &bull; Scroll to fly &bull; Right-click to pan</p>
      <div id="stats" class="text-slate-500 text-xs mt-1">0 videos in galaxy</div>
    </div>

    <!-- Custom HTML Tooltip -->
    <div id="tooltip" class="tooltip">
      <img id="tt-img" src="" alt="" class="w-full h-auto aspect-video object-cover rounded mb-2 bg-slate-800 hidden">
      <h3 id="tt-title" class="text-white font-medium text-sm line-clamp-2 leading-snug"></h3>
      <p id="tt-channel" class="text-slate-400 text-xs mt-1"></p>
      <div class="mt-2 flex items-center justify-between">
        <span id="tt-cluster" class="text-[10px] font-bold px-2 py-0.5 rounded text-slate-900 truncate max-w-[150px]"></span>
        <div class="text-[10px] uppercase tracking-wider text-cyan-400 font-semibold flex items-center gap-1">
          <span>Click to watch</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Filter Sidebar -->
  <div class="w-full md:w-64 bg-slate-900 border-l border-slate-800 p-4 flex flex-col h-full overflow-y-auto z-10">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-white font-semibold text-sm">Semantic Clusters</h3>
      <button 
        id="btn-reset"
        class="text-xs transition-colors text-slate-600 cursor-not-allowed"
        disabled
      >
        Reset Filter
      </button>
    </div>
    <div id="sidebar-filters" class="flex flex-col gap-2">
      <!-- Generated by JS -->
    </div>
  </div>

  <script>
    const CLUSTER_COLORS = [
      "#4DE1FF", "#06D6A0", "#FFD166", "#EF476F", "#118AB2",
      "#F78C6B", "#83D483", "#00B4D8", "#F15BB5", "#FEE440", 
      "#00F5D4", "#9D4EDD"
    ];

    let allData = [];
    let clusterLabels = {};
    let clusters = [];
    let activeClusters = new Set();
    let graph = null;

    // Load Data
    Promise.all([
      fetch('/data/video-embeddings.json').then(r => r.json()),
      fetch('/data/cluster_labels.json').then(r => r.ok ? r.json() : {}).catch(() => ({}))
    ]).then(([data, labels]) => {
      allData = data;
      clusterLabels = labels;
      
      // Extract unique clusters
      clusters = [...new Set(data.map(d => d.cluster))].sort((a,b) => a - b);
      
      document.getElementById('loading').style.display = 'none';
      
      initSidebar();
      initGraph();
    }).catch(err => {
      console.error("Failed to load data", err);
      document.getElementById('loading').innerHTML = '<p class="text-red-400">Failed to load data.</p>';
    });

    // Sidebar Interaction Logic
    function toggleCluster(c) {
      if (activeClusters.has(c)) {
        activeClusters.delete(c);
      } else {
        activeClusters.add(c);
      }
      updateSidebarUI();
      updateGraphData();
    }

    document.getElementById('btn-reset').addEventListener('click', () => {
      if (activeClusters.size > 0) {
        activeClusters.clear();
        updateSidebarUI();
        updateGraphData();
      }
    });

    function initSidebar() {
      const container = document.getElementById('sidebar-filters');
      container.innerHTML = '';
      
      clusters.forEach(c => {
        const el = document.createElement('label');
        el.className = "flex items-center gap-3 cursor-pointer group";
        el.onclick = (e) => {
          e.preventDefault(); // handled by div click to avoid double fire
          toggleCluster(c);
        };
        
        // Setup internal HTML structure
        el.innerHTML = `
          <div class="relative flex items-center justify-center w-5 h-5 rounded border border-slate-700 bg-slate-950 overflow-hidden transition-colors" id="swatch-border-${c}">
            <div class="absolute inset-0 transition-opacity" id="swatch-bg-${c}" style="background-color: ${CLUSTER_COLORS[c % CLUSTER_COLORS.length]}"></div>
            <svg id="swatch-check-${c}" class="w-3 h-3 text-slate-900 z-10 drop-shadow-sm hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <span id="label-text-${c}" class="text-sm transition-colors truncate max-w-[180px]">
            ${clusterLabels[c] || 'Cluster Group ' + (c+1)}
          </span>
        `;
        container.appendChild(el);
      });
      
      updateSidebarUI();
    }

    function updateSidebarUI() {
      const isShowAll = activeClusters.size === 0;
      
      // Update Reset button state
      const btnReset = document.getElementById('btn-reset');
      if (isShowAll) {
        btnReset.classList.remove('text-cyan-400', 'hover:text-white');
        btnReset.classList.add('text-slate-600', 'cursor-not-allowed');
        btnReset.disabled = true;
      } else {
        btnReset.classList.add('text-cyan-400', 'hover:text-white');
        btnReset.classList.remove('text-slate-600', 'cursor-not-allowed');
        btnReset.disabled = false;
      }

      clusters.forEach(c => {
        const isLit = isShowAll || activeClusters.has(c);
        
        const border = document.getElementById(`swatch-border-${c}`);
        const bg = document.getElementById(`swatch-bg-${c}`);
        const check = document.getElementById(`swatch-check-${c}`);
        const text = document.getElementById(`label-text-${c}`);
        
        if (isLit) {
          border.classList.remove('border-slate-700');
          border.classList.add('border-transparent');
          bg.classList.remove('opacity-20');
          bg.classList.add('opacity-100');
          text.classList.remove('text-slate-600', 'group-hover:text-slate-400');
          text.classList.add('text-slate-200', 'group-hover:text-white', 'font-medium');
        } else {
          border.classList.add('border-slate-700');
          border.classList.remove('border-transparent');
          bg.classList.add('opacity-20');
          bg.classList.remove('opacity-100');
          text.classList.add('text-slate-600', 'group-hover:text-slate-400');
          text.classList.remove('text-slate-200', 'group-hover:text-white', 'font-medium');
        }

        if (activeClusters.has(c)) {
          check.classList.remove('hidden');
        } else {
          check.classList.add('hidden');
        }
      });
    }

    // 3D Graph Logic
    function getFilteredGraphData() {
      const SCALE_FACTOR = 50;
      const isShowAll = activeClusters.size === 0;
      
      const filtered = allData.filter(d => isShowAll || activeClusters.has(d.cluster));
      document.getElementById('stats').innerText = `${filtered.length} videos in galaxy`;

      return {
        nodes: filtered.map(d => ({
          id: d.id,
          fx: d.x * SCALE_FACTOR,
          fy: d.y * SCALE_FACTOR,
          fz: (d.z || 0) * SCALE_FACTOR,
          title: d.title,
          url: d.url,
          thumbnail_url: d.thumbnail_url,
          channel_title: d.channel_title,
          year: d.year,
          cluster: d.cluster,
          color: CLUSTER_COLORS[d.cluster % CLUSTER_COLORS.length]
        })),
        links: []
      };
    }

    function initGraph() {
      const container = document.getElementById('3d-graph');
      
      graph = ForceGraph3D()(container)
        .graphData(getFilteredGraphData())
        .nodeLabel(() => '') // Disable default title
        .nodeColor('color')
        .nodeRelSize(2.5)
        .nodeOpacity(0.85)
        .enableNodeDrag(false)
        .backgroundColor('#020617')
        .showNavInfo(false)
        .onNodeClick(node => {
          if (node && node.url) window.open(node.url, '_blank');
        })
        .onNodeHover(node => {
          const containerElem = document.getElementById('explorer-container');
          containerElem.style.cursor = node ? 'pointer' : 'grab';
          updateTooltip(node);
        });
        
      // Handle tooltip positioning
      container.addEventListener('mousemove', (e) => {
        const tooltip = document.getElementById('tooltip');
        // Prevent tooltip from overflowing the right side of the screen
        const xOffset = (e.clientX > window.innerWidth - 350) ? -tooltip.offsetWidth - 15 : 15;
        tooltip.style.transform = `translate(${xOffset}px, 15px)`;
        tooltip.style.left = e.clientX + 'px';
        tooltip.style.top = e.clientY + 'px';
      });

      // Handle Resize
      window.addEventListener('resize', () => {
        graph.width(container.clientWidth).height(container.clientHeight);
      });
    }

    function updateGraphData() {
      if (graph) {
        graph.graphData(getFilteredGraphData());
      }
    }

    function updateTooltip(node) {
      const tooltip = document.getElementById('tooltip');
      if (!node) {
        tooltip.classList.remove('visible');
        return;
      }
      
      const img = document.getElementById('tt-img');
      if (node.thumbnail_url) {
        img.src = node.thumbnail_url;
        img.classList.remove('hidden');
      } else {
        img.classList.add('hidden');
      }

      document.getElementById('tt-title').innerText = node.title;
      document.getElementById('tt-channel').innerText = node.channel_title + (node.year ? ` • ${node.year}` : '');
      
      const clusterSpan = document.getElementById('tt-cluster');
      clusterSpan.innerText = clusterLabels[node.cluster] || `Cluster ${node.cluster + 1}`;
      clusterSpan.style.backgroundColor = CLUSTER_COLORS[node.cluster % CLUSTER_COLORS.length];
      
      tooltip.classList.add('visible');
    }
  </script>
</body>
</html>
