<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>

    <pattern id="nodePattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.5" fill="#0d9488" opacity="0.15"/>
      <line x1="30" y1="0" x2="30" y2="60" stroke="#0d9488" opacity="0.06"/>
      <line x1="0" y1="30" x2="60" y2="30" stroke="#0d9488" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#nodePattern)"/>

  <!-- Bottom geometric accent -->
  <path d="M0 630 L200 630 L0 480 Z" fill="url(#tealGradient)" opacity="0.08"/>
  <path d="M1200 630 L1000 630 L1200 450 Z" fill="url(#tealGradient)" opacity="0.06"/>
  <path d="M1200 630 L900 630 L1200 380 Z" fill="url(#tealGradient)" opacity="0.04"/>

  <!-- Top right hexagon -->
  <g transform="translate(1050, 100)" opacity="0.12">
    <polygon points="40,0 80,23 80,69 40,92 0,69 0,23" fill="none" stroke="#0d9488" stroke-width="2"/>
    <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  </g>

  <!-- Top left geometric cluster -->
  <g transform="translate(80, 80)" opacity="0.15">
    <rect x="0" y="0" width="24" height="24" fill="#0d9488"/>
    <rect x="32" y="8" width="16" height="16" fill="#0d9488" opacity="0.7"/>
    <rect x="8" y="32" width="16" height="16" fill="#0d9488" opacity="0.7"/>
  </g>

  <!-- Content area -->
  <g transform="translate(80, 220)">
    <!-- Accent label -->
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#0d9488" opacity="0.8">
      PERSONAL BLOG
    </text>

    <!-- Title -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="64" font-weight="700" fill="#18181b">
      Al Harkan's Blog
    </text>

    <!-- Decorative underline -->
    <rect x="0" y="85" width="60" height="4" fill="#0d9488"/>

    <!-- Subtitle -->
    <text x="0" y="130" font-family="Arial, sans-serif" font-size="26" font-weight="400" fill="#52525b">
      On Media, Technology, and Everything in Between
    </text>
  </g>

  <!-- URL badge -->
  <g transform="translate(950, 560)">
    <rect width="200" height="44" rx="22" fill="#0d9488" opacity="0.1"/>
    <rect width="200" height="44" rx="22" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.3"/>
    <text x="100" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#0d9488" text-anchor="middle">
      raihankalla.id
    </text>
  </g>

  <!-- Small accent dot -->
  <circle cx="920" cy="582" r="4" fill="#0d9488" opacity="0.4"/>
</svg>